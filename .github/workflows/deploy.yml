name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      # TanStack Start 프리렌더 → 정적 산출물은 dist/client.
      # GitHub Pages 프로젝트 사이트(하위경로 /jecheori/)용 base. 검증됨:
      # vite base + router basepath로 자산 URL·라우팅이 /jecheori/로 다시 쓰인다.
      # 루트 서빙(Cloudflare Pages)이면 이 env를 지운다.
      - run: npm run build
        env:
          BASE_PATH: /jecheori/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client
      - id: deployment
        uses: actions/deploy-pages@v4
