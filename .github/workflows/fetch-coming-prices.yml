name: fetch-coming-prices

# 씨앗형 — cron 없이 수동 실행만. 다가오는 제철 카드용 "작년 같은 시기" 가격을
# 작년 12개월치 1회 수집해 public/data/coming-prices.json에 커밋한다.
# (가격 스냅샷은 매일 update-prices.yml이 갱신하지만, 이 씨앗은 거의 안 변해 상시 CI 없음.)
on:
  workflow_dispatch:
    inputs:
      year:
        description: '수집 대상 연도 (비우면 작년)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch KAMIS coming-season prices
        # YEAR는 env로 받아 따옴표로 감싼다(run:에 직접 보간 금지 — 커맨드 인젝션 방지).
        # 스크립트가 Number()로 파싱하므로 비정상 값은 NaN→실패로 걸린다.
        run: |
          if [ -n "$YEAR" ]; then
            node scripts/fetch-coming-prices.mjs --year="$YEAR"
          else
            node scripts/fetch-coming-prices.mjs
          fi
        env:
          KAMIS_CERT_KEY: ${{ secrets.KAMIS_CERT_KEY }}
          KAMIS_CERT_ID: ${{ secrets.KAMIS_CERT_ID }}
          YEAR: ${{ inputs.year }}
      - name: Commit if changed
        run: |
          if ! git diff --quiet public/data/coming-prices.json; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add public/data/coming-prices.json
            git commit -m "chore: 다가오는 제철 가격 씨앗 수집 ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            git push
          else
            echo "변경 없음"
          fi
